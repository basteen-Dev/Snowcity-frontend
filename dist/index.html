  <!-- Native Banner Fetch & Preload for LCP Optimization -->
  <script>
    if (!window.location.pathname.startsWith('/parkpanel')) {
      (async function preloadHero() {
        try {
          const rawUrl = 'http://localhost:4000';
          const baseUrl = (rawUrl.startsWith('%') || !rawUrl || rawUrl === 'http://localhost:4000') 
            ? 'https://app.snowcityblr.com' 
            : rawUrl;
          const url = `${baseUrl}/api/banners/public?active=true&page=1&limit=12`;
          const res = await fetch(url, { priority: 'high' });
          if (!res.ok) return;
          const data = await res.json();
          const banners = data.data || data;
          const bDate = (b) => new Date(b.created_at || b.inserted_at || 0);
          banners.sort((a,b) => bDate(a) - bDate(b));
          
          if (banners && banners.length > 0) {
            const b = banners[0];
            const deskImg = b.web_image || b.image_web || b.desktop_image || b.image_url || b.image;
            const mobImg = b.mobile_image || b.image_mobile || b.mobile || b.image_url_mobile || deskImg;
            
            if (deskImg) {
              const lD = document.createElement('link');
              lD.rel = 'preload'; lD.as = 'image'; lD.href = deskImg; lD.media = '(min-width: 768px)';
              lD.fetchPriority = 'high';
              document.head.appendChild(lD);
            }
            if (mobImg && mobImg !== deskImg) {
              const lM = document.createElement('link');
              lM.rel = 'preload'; lM.as = 'image'; lM.href = mobImg; lM.media = '(max-width: 767px)';
              lM.fetchPriority = 'high';
              document.head.appendChild(lM);
            }
            // Cache for Redux to pick up immediately without waiting for hydration
            window.__INITIAL_BANNERS__ = banners;
          }
        } catch (e) {}
      })();
    }
  </script>
